<body>
<div class="shell">
  <header class="mast"><div><div class="kicker">ABSTRACT CLASS · INHERITANCE · OBJECT REFERENCE</div><h1>Java 物件呼叫實驗室</h1></div><div><p>播放程式如何從 <code>new</code> 進入建構子鏈，再沿著物件引用呼叫繼承與覆寫的方法。</p><div class="legend">橘色＝目前執行　綠線＝已完成　刪除線＝不會執行</div></div></header>
  <section class="toolbar" aria-label="教學控制">
    <div class="toolbar-row"><div class="group" id="scenarioTabs"></div><div class="progress"><span id="counter"></span><div class="track"><i id="bar"></i></div></div></div>
    <div class="toolbar-row"><div class="group"><button class="tab active" data-view="flow">① 動態執行流程</button><button class="tab" data-view="class">② 類別平面圖</button></div><div class="group"><button id="prev">← 上一步</button><button class="play" id="play">▶ 播放</button><button id="next">下一步 →</button><button id="reset">重新開始</button><select id="speed" aria-label="播放速度"><option value="2200">慢速</option><option value="1400" selected>一般</option><option value="800">快速</option></select></div></div>
  </section>
  <section class="workspace">
    <main><div id="flowView" class="flow"></div><div id="classView" class="class-map hidden"></div></main>
    <aside class="inspector"><div class="step-no" id="stepNo"></div><h2 id="title"></h2><div class="call" id="call"></div><p id="desc"></p><pre class="code" id="code"></pre><p class="tip" id="tip"></p><h3>Console 輸出</h3><div class="console" id="console"></div><section class="method-panel"><h3>目前執行方法 <span class="method-owner" id="methodOwner"></span></h3><pre class="method-code" id="methodCode"></pre></section></aside>
  </section>
</div>
<script>
const configs={
 line:{label:"LinePay · 1000 元",kind:"ALinePay",varName:"linePayPayment",order:"order1",field:"linePay",create:"createOrderLinePay",amount:1000,name:"LinePay",rate:"0.01",fee:10,process:"正在跳轉至 LinePay 應用程式..."},
 card:{label:"信用卡 · 2000 元",kind:"ACreditCard",varName:"creditCardPayment",order:"order2",field:"creditCard",create:"createOrderCreditCard",amount:2000,name:"信用卡",rate:"0.03",fee:60,process:"正在進行信用卡授權驗證..."},
 invalid:{label:"錯誤金額 · -100 元",kind:"ALinePay",varName:"linePayPayment",order:"order1",field:"linePay",create:"createOrderLinePay",amount:-100,name:"LinePay",rate:"0.01",fee:0,process:"",invalid:true}
};
function makeSteps(c){
 const base=[
 ["進入 Demo.main()","Demo","程式從 main 方法開始。","public static void main(String[] args)","JVM 呼叫 Demo.main()","main 是此範例的執行入口。",""],
 ["遇到 new","Demo","new 表示要建立一個新的實體物件。",`${c.kind} ${c.varName} = new ${c.kind}();`,"Demo 要求建立付款物件","變數不是物件本身，它會保存物件的參考。",""],
 ["進入子類別建構子",c.kind,`先找到 ${c.kind}() 建構子。`,`public ${c.kind}() {\n  super("${c.name}", ${c.rate});\n}`,`new → ${c.kind}()`,"子類別建構子的第一個動作是呼叫父類別建構子。",""],
 ["呼叫 super(...)",c.kind,"super(...) 不是建立另一個父類別物件，而是初始化同一個物件的父類別部分。",`super("${c.name}", ${c.rate});`,`${c.kind}() → APayment(...)`,"Java 會先完成父類別初始化，再回到子類別。",""],
 ["執行父類別建構子","APayment","參數被存入物件繼承而來的 final 欄位。",`this.paymaneName = paymaneName;\nthis.feeRate = feeRate;`,"APayment 建構子初始化屬性","final 欄位只能設定一次；此處是在建構子中賦值。",""],
 ["付款物件完成",c.kind,`${c.varName} 現在保存 ${c.kind} 物件的參考。`,`${c.kind} ${c.varName} = new ${c.kind}();`,`${c.varName} → ${c.kind} object`,"物件同時包含子類別行為與繼承自 APayment 的狀態、方法。",""],
 ["建立訂單","AOrder","把剛建立的付款物件當作建構子參數傳入。",`AOrder ${c.order} =\n  new AOrder(${c.varName});`,`Demo → AOrder(${c.kind})`,"這種由外部提供依賴物件的方式稱為建構子注入。",""],
 ["保存物件引用","AOrder",`this.${c.field} 與 ${c.varName} 指向同一個付款物件。`,`this.${c.field} = ${c.field};`,`AOrder.${c.field} → ${c.kind} object`,"沒有再 new 一次，因此不是兩個付款物件。",""],
 ["呼叫建立訂單", "AOrder",`透過 ${c.order} 物件呼叫公開方法。`,`${c.order}.${c.create}(${c.amount});`,`Demo → ${c.order}.${c.create}(...)`,"點號左邊是接收呼叫的物件參考。",`建立訂單(${c.name})`],
 ["透過欄位呼叫 pay","AOrder",`訂單物件沿著 ${c.field} 欄位找到付款物件。`,`this.${c.field}.pay(${c.amount});`,`AOrder → ${c.kind}.pay(...)`,"pay 宣告在 APayment，但子類別物件繼承後可以使用。",""],
 ["進入 APayment.pay()","APayment","共用付款流程集中在抽象父類別。",`public void pay(int amount) { ... }`,`${c.kind} object → inherited pay()`,"抽象類別不能直接 new，但可以提供完整的一般方法。",""],
 ["驗證付款金額","APayment",c.invalid?"amount <= 0，驗證失敗，流程走向錯誤分支。":"amount > 0，驗證通過。",`validateAmount(${c.amount})`,`pay() → private validateAmount()`,"private 方法只能由 APayment 自己內部呼叫。",c.invalid?"付款金額必須大於0":""]
 ];
 if(c.invalid)return base.concat([["付款失敗並結束","APayment","因驗證失敗，後續計費、串接金流與明細都不執行。",`System.out.println("${c.name}付款失敗");`,`pay() → return`,"被刪除線標記的步驟代表此情境不會執行。",`${c.name}付款失敗`]]);
 return base.concat([
 ["計算手續費","APayment",`${c.amount} × ${c.rate}，再強制轉型為 int，結果是 ${c.fee}。`,`int fee = (int) (amount * getFeeRate());`,`pay() → private calculateFee()`, "double 強制轉 int 會捨棄小數部分。",`開始使用${c.name}付款`],
 ["呼叫抽象方法","APayment","pay() 呼叫 processPayment；執行時會選擇實際物件覆寫的版本。",`processPayment(amount, fee);`,`APayment.pay() → ${c.kind}.processPayment()`,"這是多型：父類別定義流程，子類別提供具體行為。",c.process],
 ["執行覆寫方法",c.kind,`${c.kind} 的 @Override 方法負責具體金流行為。`,`@Override\npublic void processPayment(int amount, int fee)`,`${c.kind}.processPayment(${c.amount}, ${c.fee})`,"同一個 pay 流程可搭配不同付款子類別。",`${c.name}支付成功，金額: ${c.amount}，手續費: ${c.fee}`],
 ["印出付款明細","APayment","回到父類別共用流程，呼叫私有明細方法。",`printPaymentResult(amount, fee);`,`pay() → private printPaymentResult()`, "覆寫方法結束後，控制權回到呼叫它的 pay 方法。",`付款金額: ${c.amount}\n手續費: ${c.fee}\n${c.name}付款完成`],
 ["返回 main","Demo","本次付款呼叫完成，控制權逐層返回 Demo.main()。","// 繼續執行 main 後續程式",`${c.kind} → AOrder → Demo`,"方法結束後會回到原本呼叫它的位置。",""]
 ]);
}
let scenario="line",view="flow",index=0,timer=null;
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
function steps(){return makeSteps(configs[scenario])}
function currentMethod(c,title){
 const methods={
  main:{owner:"Demo.main()",active:["遇到 new","付款物件完成"].includes(title)?1:title==="建立訂單"?2:title==="呼叫建立訂單"?3:title==="返回 main"?4:0,lines:["public static void main(String[] args) {",`    ${c.kind} ${c.varName} = new ${c.kind}();`,`    AOrder ${c.order} = new AOrder(${c.varName});`,`    ${c.order}.${c.create}(${c.amount});`,"}"]},
  childConstructor:{owner:`${c.kind}.${c.kind}()`,active:title==="呼叫 super(...)"?1:0,lines:[`public ${c.kind}() {`,`    super("${c.name}", ${c.rate});`,"}"]},
  parentConstructor:{owner:"APayment.APayment()",active:title==="執行父類別建構子"?[1,2]:[0],lines:["public APayment(String paymaneName, double feeRate) {","    this.paymaneName = paymaneName;","    this.feeRate = feeRate;","}"]},
  orderConstructor:{owner:"AOrder.AOrder()",active:title==="保存物件引用"?1:0,lines:[`public AOrder(${c.kind} ${c.field}) {`,`    this.${c.field} = ${c.field};`,"}"]},
  createOrder:{owner:`AOrder.${c.create}()`,active:title==="透過欄位呼叫 pay"?2:0,lines:[`public void ${c.create}(int amount) {`,`    System.out.println("建立訂單(${c.name})");`,`    this.${c.field}.pay(amount);`,"}"]},
  pay:{owner:"APayment.pay()",active:title==="付款失敗並結束"?4:title==="呼叫抽象方法"?8:title==="印出付款明細"?9:1,lines:["public void pay(int amount) {","    String message = validateAmount(amount);","    if (!message.isEmpty()) {","        System.out.println(message);",`        System.out.println(getPaymaneName() + "付款失敗");`,"    } else {","        int fee = calculateFee(amount);",`        System.out.println("開始使用" + getPaymaneName() + "付款");`,"        processPayment(amount, fee);","        printPaymentResult(amount, fee);","    }","}"]},
  validate:{owner:"APayment.validateAmount()",active:c.invalid?1:3,lines:["private String validateAmount(int amount) {","    if (amount <= 0) {",'        return "付款金額必須大於0";',"    } else {",'        return "";',"    }","}"]},
  fee:{owner:"APayment.calculateFee()",active:1,lines:["private int calculateFee(int amount) {","    return (int) (amount * getFeeRate());","}"]},
  process:{owner:`${c.kind}.processPayment()`,active:2,lines:["@Override","public void processPayment(int amount, int fee) {",`    System.out.println("${c.process}");`,`    System.out.println("${c.name}支付成功，金額: " + amount`, '        + "，手續費: " + fee);',"}"]},
  print:{owner:"APayment.printPaymentResult()",active:1,lines:["private void printPaymentResult(int amount, double fee) {",'    System.out.println("付款金額: " + amount);','    System.out.println("手續費: " + fee);','    System.out.println(getPaymaneName() + "付款完成");',"}"]}
 };
 if(["進入子類別建構子","呼叫 super(...)"].includes(title))return methods.childConstructor;
 if(title==="執行父類別建構子")return methods.parentConstructor;
 if(["建立訂單","保存物件引用"].includes(title))return methods.orderConstructor;
 if(["呼叫建立訂單","透過欄位呼叫 pay"].includes(title))return methods.createOrder;
 if(title==="驗證付款金額")return methods.validate;
 if(title==="計算手續費")return methods.fee;
 if(title==="執行覆寫方法")return methods.process;
 if(title==="印出付款明細")return methods.print;
 if(["進入 APayment.pay()","呼叫抽象方法","付款失敗並結束"].includes(title))return methods.pay;
 return methods.main;
}
function renderCurrentMethod(c,title){
 const method=currentMethod(c,title),escape=s=>s.replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
 const activeLines=title==="執行父類別建構子"?[1,2]:(Array.isArray(method.active)?method.active:[method.active]);
 $("#methodOwner").textContent=method.owner;
 $("#methodCode").innerHTML=method.lines.map((line,i)=>`<span class="method-line ${activeLines.includes(i)?"active":""}">${escape(line) || " "}</span>`).join("");
}
function positionClassReferenceArrow(){
 const row=$("#classView .property-reference-row"),arrow=$("#classView .class-link-arrow"),target=$("#classView .payment-class-orbit");
 if(!row||!arrow||!target)return;
 const rowBox=row.getBoundingClientRect(),targetBox=target.getBoundingClientRect();
 arrow.style.width=`${Math.max(36,targetBox.left-rowBox.right-28)}px`;
}
function render(){
 const c=configs[scenario],s=steps(),cur=s[index]; $("#counter").textContent=`${index+1} / ${s.length}`;$("#bar").style.width=`${(index+1)/s.length*100}%`;$("#stepNo").textContent=`STEP ${String(index+1).padStart(2,"0")} · ${cur[1]}`;$("#title").textContent=cur[0];$("#desc").textContent=cur[2];$("#code").textContent=cur[3];$("#call").textContent=cur[4];$("#tip").textContent="教學重點："+cur[5];$("#console").textContent=s.slice(0,index+1).map(x=>x[6]).filter(Boolean).join("\n");
 $("#flowView").innerHTML=s.map((x,i)=>`<button class="flow-node ${i===index?"active":i<index?"done":""}" data-i="${i}"><b>${String(i+1).padStart(2,"0")}</b><b>${x[0]}</b><span>${x[4]}</span></button>`).join("")+(c.invalid?`<div class="flow-node skipped"><b>×</b><b>不執行</b><span>calculateFee → processPayment → printPaymentResult</span></div>`:"");
 $$("#flowView [data-i]").forEach(b=>b.onclick=()=>{pause();index=+b.dataset.i;render()});
 renderClasses(cur[1],cur[0]);renderCurrentMethod(c,cur[0]);$("#prev").disabled=index===0;$("#next").disabled=index===s.length-1;
}
function renderClasses(owner,title){
 const c=configs[scenario],isParent=owner==="APayment";
 const childTargetSteps=["遇到 new","進入子類別建構子","呼叫 super(...)","執行父類別建構子","付款物件完成","透過欄位呼叫 pay","進入 APayment.pay()","驗證付款金額","計算手續費","呼叫抽象方法","執行覆寫方法","印出付款明細"];
 const isChild=owner===c.kind||childTargetSteps.includes(title),isService=owner==="AOrder",showClassReference=index>=7;
 const chip=(label,steps=[],softSteps=[])=>`<span class="member-chip ${steps.includes(title)?"active":softSteps.includes(title)?"active-soft":""}">${label}</span>`;
 $("#classView").innerHTML=`<div class="class-legend"><b>外圈：${c.kind} 子類別物件</b><b>內圈：APayment 父類別部分</b><b>橘色：目前執行位置</b></div>
 <section class="class-diagram-stage">
  <div class="payment-class-orbit ${isChild?"active":""}">
   <div class="payment-own-area"><div class="class-label"><small>子類別自己宣告</small><strong>${c.kind}</strong></div>${chip(`public ${c.kind}()`,["進入子類別建構子","呼叫 super(...)"])}${chip("@Override processPayment(amount, fee)",["呼叫抽象方法","執行覆寫方法"])}</div>
   <div class="override-note ${title==="呼叫抽象方法"?"pulse":""}">processPayment()<br>父類別定義 → 子類別實作</div>
   <div class="payment-parent-orbit ${isParent?"active":""}">
    <div class="payment-parent-grid">
     <div class="class-label"><small>abstract 父類別</small><strong>APayment</strong><div class="private-warning">private 成員存在於父類別部分，<br>子類別不能直接存取。</div></div>
     <div><div class="member-section"><span class="member-section-label">屬性</span>${chip('private final paymaneName',["執行父類別建構子"])}${chip('private final feeRate',["執行父類別建構子"])}</div><div class="member-section"><span class="member-section-label">建構子與方法</span>${chip('public APayment(String paymaneName, double feeRate)',["呼叫 super(...)","執行父類別建構子"])}${chip("public pay(amount)",["透過欄位呼叫 pay","進入 APayment.pay()"])}${chip("private validateAmount()",["驗證付款金額"])}${chip("private calculateFee()",["計算手續費"])}${chip("public abstract processPayment()",[],["呼叫抽象方法"])}${chip("private printPaymentResult()",["印出付款明細"])}</div></div>
    </div>
   </div>
  </div>
  <div class="order-class-orbit ${isService?"active":""}"><h3>AOrder</h3><div class="order-member-grid"><div class="member-section"><span class="member-section-label">屬性</span><div class="property-reference-row">${chip(`private ${c.kind} ${c.field}`,["保存物件引用"])}${showClassReference?`<div class="class-link-arrow"><span>${c.field} 欄位引用整個 ${c.kind} 子類別</span></div>`:""}</div></div><div class="member-section"><span class="member-section-label">建構子與方法</span>${chip(`public AOrder(${c.kind} ${c.field})`,["建立訂單"])}${chip(`public ${c.create}(int amount)`,["呼叫建立訂單"])}</div></div></div>
 </section>`;
 requestAnimationFrame(positionClassReferenceArrow);
}
function pause(){clearInterval(timer);timer=null;$("#play").textContent="▶ 繼續"}
function togglePlayback(){if(timer){pause();return}$("#play").textContent="Ⅱ 暫停";timer=setInterval(()=>{if(index>=steps().length-1){pause();return}index++;render()},+$("#speed").value)}
Object.entries(configs).forEach(([k,c])=>$("#scenarioTabs").insertAdjacentHTML("beforeend",`<button class="scenario ${k===scenario?"active":""}" data-s="${k}">${c.label}</button>`));
$$(".scenario").forEach(b=>b.onclick=()=>{pause();scenario=b.dataset.s;index=0;$$(".scenario").forEach(x=>x.classList.toggle("active",x===b));render()});
$$(".tab").forEach(b=>b.onclick=()=>{view=b.dataset.view;$$(".tab").forEach(x=>x.classList.toggle("active",x===b));["flow","class"].forEach(v=>$(`#${v}View`).classList.toggle("hidden",v!==view));render()});
$("#play").onclick=togglePlayback;$("#prev").onclick=()=>{pause();index=Math.max(0,index-1);render()};$("#next").onclick=()=>{pause();index=Math.min(steps().length-1,index+1);render()};$("#reset").onclick=()=>{pause();index=0;render()};$("#speed").onchange=()=>{if(timer){pause();togglePlayback()}};
addEventListener("keydown",e=>{if(["INPUT","SELECT","BUTTON"].includes(document.activeElement.tagName))return;if(e.code==="Space"){e.preventDefault();togglePlayback()}if(e.key==="ArrowRight")$("#next").click();if(e.key==="ArrowLeft")$("#prev").click()});
addEventListener("resize",positionClassReferenceArrow);
render();
</script>
